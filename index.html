 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Wilbert Gamis | Digital Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            font-family: 'Inter', sans-serif;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        .pointer-events-auto { pointer-events: auto; }
        
        .glass-text {
            background: linear-gradient(135deg, #fff 0%, #94a3b8 50%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pulse-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <main class="ui-layer min-h-screen flex flex-col items-center justify-center text-center px-4">
        <header class="mb-8">
            <h1 class="text-5xl md:text-7xl font-900 glass-text tracking-tighter mb-2">
                JOHN WILBERT GAMIS
            </h1>
            <p class="text-blue-400 text-sm md:text-lg font-medium tracking-[0.3em] uppercase italic">
                Mobile Specialist & API Architect
            </p>
        </header>

        <div class="flex flex-col gap-6 mt-[250px] md:mt-[300px]">
            <button class="pointer-events-auto pulse-glow bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-bold transition-all transform hover:scale-105 active:scale-95">
                View Projects
            </button>
            
            <a href="https://github.com/WilWilbert123" target="_blank" class="pointer-events-auto flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <span class="text-xs tracking-widest uppercase">GitHub</span>
            </a>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Glassmorphic Card ---
        const geometry = new THREE.BoxGeometry(3.5, 2.2, 0.1);
        const material = new THREE.MeshPhysicalMaterial({
            transmission: 0.95,
            thickness: 0.5,
            roughness: 0.15,
            ior: 1.5,
            clearcoat: 1,
            clearcoatRoughness: 0.1,
            color: 0xffffff,
            attenuationColor: 0xffffff,
            attenuationDistance: 1,
            transparent: true,
        });
        const card = new THREE.Mesh(geometry, material);
        scene.add(card);

        // --- Particle System (Starfield) ---
        const particlesGeometry = new THREE.BufferGeometry();
        const count = 1500;
        const positions = new Float32Array(count * 3);
        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 20;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0x4f46e5 });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x7c3aed, 20); // Violet
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const blueLight = new THREE.PointLight(0x2563eb, 20); // Blue
        blueLight.position.set(-5, -5, 2);
        scene.add(blueLight);

        camera.position.z = 5;

        // --- Interactivity ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // Device Orientation for Mobile
        window.addEventListener('deviceorientation', (e) => {
            if(e.gamma) {
                mouseX = e.gamma / 45;
                mouseY = e.beta / 45;
            }
        });

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Smooth Interpolation (Lerp)
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // Apply Rotations
            card.rotation.y = targetX * 0.5;
            card.rotation.x = -targetY * 0.5;
            
            // Subtle floating motion
            card.position.y = Math.sin(Date.now() * 0.001) * 0.1;

            // Move lights relative to mouse
            pointLight.position.x = targetX * 5;
            pointLight.position.y = -targetY * 5;

            // Rotate particles slowly
            particles.rotation.y += 0.0005;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
