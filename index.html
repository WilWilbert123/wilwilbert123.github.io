<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Wilbert Gamis | Digital Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        #webgl-frame {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
            z-index: 0;
        }
        .content-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem 2rem;
        }
        .interactive { pointer-events: auto; }
        .text-gradient {
            background: linear-gradient(to bottom, #ffffff 30%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cta-glow {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .cta-glow:hover {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.5);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <canvas id="webgl-frame"></canvas>

    <div class="content-overlay">
        <nav class="flex justify-between items-center">
            <div class="text-xs tracking-[0.5em] font-light opacity-50 uppercase">Portfolio // 2026</div>
            <a href="https://github.com/WilWilbert123" target="_blank" class="interactive opacity-50 hover:opacity-100 transition-opacity">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </a>
        </nav>

        <div class="max-w-4xl mx-auto">
            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter text-gradient leading-none mb-4">
                JOHN WILBERT<br>GAMIS
            </h1>
            <p class="text-indigo-400 text-sm md:text-base font-bold tracking-[0.4em] uppercase">
                Mobile Specialist & API Architect
            </p>
        </div>

        <footer>
            <button class="interactive cta-glow px-12 py-4 rounded-full text-sm font-bold tracking-widest uppercase text-white">
                Initialize Interaction
            </button>
        </footer>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Core Setup ---
        const canvas = document.querySelector('#webgl-frame');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;

        // --- 3D Monogram (Extruded 'J') ---
        const shape = new THREE.Shape();
        // Drawing a stylized J
        shape.moveTo(0, 0);
        shape.lineTo(1, 0);
        shape.lineTo(1, -2.5);
        shape.bezierCurveTo(1, -3.5, 0, -3.5, -0.5, -3);
        shape.lineTo(-0.5, -2.5);
        shape.bezierCurveTo(0, -3, 0.5, -3, 0.5, -2.5);
        shape.lineTo(0.5, 0);

        const extrudeSettings = { depth: 0.4, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1 };
        const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geometry.center();

        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.05,
            transmission: 0.9,
            thickness: 1.5,
            ior: 1.4,
            reflectivity: 0.5,
            iridescence: 0.3,
            iridescenceIOR: 1.5,
            transparent: true,
        });

        const monogram = new THREE.Mesh(geometry, glassMaterial);
        scene.add(monogram);

        // --- Environment & Particles ---
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<3000; i++) {
            starCoords.push((Math.random()-0.5)*25, (Math.random()-0.5)*25, (Math.random()-0.5)*25);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.015, color: 0x6366f1, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Lighting (Cinematic) ---
        const mainLight = new THREE.SpotLight(0x6366f1, 100);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);

        const rimLight = new THREE.PointLight(0xff00ff, 50);
        rimLight.position.set(-5, -2, -2);
        scene.add(rimLight);

        const fillLight = new THREE.RectAreaLight(0x4338ca, 5, 10, 10);
        fillLight.position.set(0, 0, -5);
        scene.add(fillLight);

        camera.position.z = 8;

        // --- Interactions ---
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5);
            mouseY = (e.clientY / window.innerHeight - 0.5);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Loop ---
        const clock = new THREE.Clock();

        function animate() {
            const elapsedTime = clock.getElapsedTime();
            
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // Animate Monogram
            monogram.rotation.y = elapsedTime * 0.3 + (targetX * 1.5);
            monogram.rotation.x = targetY * 1.5;
            monogram.position.y = Math.sin(elapsedTime) * 0.15;

            // Animate Stars
            stars.rotation.y = elapsedTime * 0.02;
            
            // Light following
            mainLight.position.x = 5 + targetX * 10;
            mainLight.position.y = 5 - targetY * 10;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
